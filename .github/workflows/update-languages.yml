name: Update Profile Languages

on:
  workflow_dispatch:

  schedule:
    # Runs every day at 03:15 UTC, which is 06:15 in Bahrain.
    - cron: "15 3 * * *"

permissions:
  contents: write

concurrency:
  group: update-profile-languages
  cancel-in-progress: true

jobs:
  update-languages:
    runs-on: ubuntu-latest

    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Generate language statistics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/update_languages.py

      - name: Commit README changes
        run: |
          if git diff --quiet README.md; then
            echo "No language changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md
          git commit -m "Update repository language statistics"
          git push
